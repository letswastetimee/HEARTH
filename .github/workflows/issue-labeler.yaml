name: Label New Issues

on:
  issues:
    types: [opened]
  workflow_dispatch:

jobs:
  label-new-issues:
    runs-on: ubuntu-latest

    steps:
      - name: Log context for debugging (optional, can remove later)
        uses: actions/github-script@v7
        with:
          script: console.log(context.payload);

      - name: Label issues based on template
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;

            // Ensure the script only runs when an issue is present
            if (!issue) {
              throw new Error("No issue found in the payload. This action is only triggered for new issues.");
            }
            
            // Extract owner and repo explicitly
            const owner = context.payload.repository.owner.login;
            const repo = context.payload.repository.name;
            
            // Debug log to ensure correct owner and repo are extracted
            console.log(`Owner: ${owner}, Repo: ${repo}`);
            
            // Default labels to apply to all issues
            const defaultLabels = ['pending-review'];
            
            // Add labels based on issue title prefix
            if (issue.title.startsWith('[H]')) {
              defaultLabels.push('hypothesis-driven');
            } else if (issue.title.startsWith('[B]')) {
              defaultLabels.push('baseline');
            } else if (issue.title.startsWith('[M]')) {
              defaultLabels.push('model-assisted');
            }
            
            // Add labels to the issue
            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number: issue.number,
              labels: defaultLabels,
            });
